# 你可以从该 URL 下载这个配置文件: https://blankmagic.github.io/surge/profile.conf
# 导入配置后替换策略组 [Proxy Group] 中订阅地址

# 官方手册 - https://manual.nssurge.com/
# 理解原理 - https://manual.nssurge.com/book/understanding-surge/cn/
# 帮助中心 - https://nssurge.zendesk.com/
# 技术社区 - https://community.nssurge.com
# 以"#" 和 "//" 开头的行为注释行

# ==========================================================
[General]
# --- 通用设置 ---
# 自动检测网络切换（增强版 Wi‑Fi 助理）
wifi-assist = true
# 混合网络
all-hybrid = false
# 游戏优化
udp-priority = false
# 连通性测试
internet-test-url = http://connectivitycheck.gstatic.com/generate_204
proxy-test-url = http://captive.apple.com/generate_204
test-timeout = 3
# GeoIP 数据库
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
# IPv6 Support / IPv6 支持
ipv6 = false
ipv6-vif = auto
# 允许其他设备连接 (局域网共享代理，按需开启)
allow-wifi-access = false
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153
http-listen = 0.0.0.0
socks5-listen = 0.0.0.0
allow-hotspot-access = true
# 远程控制与 API
external-controller-access = surge@0.0.0.0:6160
http-api = blankmagic@0.0.0.0:6166
http-api-tls = true
http-api-web-dashboard = true
# 兼容性
compatibility-mode = 1
# 跳过代理（局域网/本地服务）
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
exclude-simple-hostnames = true
read-etc-hosts = true
# DNS 配置
use-local-host-item-for-proxy = true
# 防 DNS 污染
hijack-dns = *:53
encrypted-dns-follow-outbound-mode = false
include-all-networks = false
include-local-networks = false
dns-server = 223.5.5.5, 223.6.6.6, 119.29.29.29
encrypted-dns-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query

# --- 高级设置 ---
# 日志级别 (日常用 notify，排查问题改 info)
loglevel = notify
show-error-page-for-reject = true
force-http-engine-hosts = *.ott.cibntv.net, 123.59.31.1, 119.18.193.135, 122.14.246.33, 175.102.178.52, 116.253.24.*, 175.6.26.*, 220.169.153.*
always-real-ip = dns.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.turn.twilio.com, *.stun.twilio.com, stun.syncthing.net, stun.*, lancache.steamcontent.com, 127.*.*.*.sslip.io, 127-*-*-*.sslip.io, *.127.*.*.*.sslip.io, *-127-*-*-*.sslip.io, 127.*.*.*.nip.io, 127-*-*-*.nip.io, *.127.*.*.*.nip.io, *-127-*-*-*.nip.io
udp-policy-not-supported-behaviour = REJECT
proxy-restricted-to-lan = false

# ==========================================================
[Proxy]
# 直接连接
DIRECT = direct
# 示例节点（请替换为实际节点）
# SS-Server = ss, 1.2.3.4, 443, aes-256-gcm, your-password, obfs=http, obfs-host=example.com
# Trojan-Server = trojan, 1.2.3.4, 443, password=your-password, sni=example.com, alpn=h2,http/1.1
# VMess-Server = vmess, 1.2.3.4, 443, username=your-uuid, tls=true, sni=example.com, alpn=h2,http/1.1

# ==========================================================
[Proxy Group]
# 核心策略组
Final = select, Proxy🪁, DIRECT
Proxy🪁 = select, 🇺🇸 America, 🇭🇰 Load balance, 🇸🇬 Singapore, 🇨🇳 Fallback, policy-path=URL //policy-path=你的订阅地址
CN = select, DIRECT
# Home⛺️ = subnet, default = Proxy🪁, "SSID:value" = DIRECT, "TYPE:CELLULAR" = Proxy🪁

# 应用专属组
Netflix = select, 🇺🇸 America, 🇭🇰 Load balance, 🇸🇬 Singapore, 🇨🇳 Fallback
Twitter = select, 🇺🇸 America, Proxy🪁 
Telegram = select, 🇭🇰 Load balance, 🇸🇬 Singapore, hybrid=off // hybrid=off 即使在 All Hybrid 或 WiFi Assist 开启时，有 WiFi 就不使用数据网络
Apple = select, DIRECT, Proxy🪁
AdBlock = select, REJECT, DIRECT

# 自动选择组（隐藏）
🇺🇸 America = smart, include-other-group=Proxy🪁, policy-regex-filter=美国, interval=600, tolerance=100, evaluate-before-use=true, hidden=true
🇭🇰 Load balance = smart, include-other-group=Proxy🪁, policy-regex-filter=(港|HK), interval=-1, tolerance=100, persistent=true, hidden=true
🇸🇬 Singapore = smart, include-other-group=Proxy🪁, policy-regex-filter=(新加坡|狮城), interval=-1, tolerance=100, persistent=true, hidden=true
🇨🇳 Fallback = fallback, include-other-group=Proxy🪁, policy-regex-filter=台湾, timeout=3, interval=600, evaluate-before-use=true, hidden=true

# ==========================================================
# 分流规则
# 匹配顺序：从上至下，首次匹配生效
[Rule]
# --- 基础自定义规则 ---
DOMAIN-SUFFIX,vercel.app,Proxy🪁 // Sub-Store 的 Web 页面
IP-ASN,4134,DIRECT,no-resolve // China Telecom

# 腾讯视频开屏广告
DOMAIN,ad.tencentvideo.com,REJECT
DOMAIN,adstats.tencentvideo.com,REJECT
DOMAIN,info6.video.qq.com,REJECT
DOMAIN-SUFFIX,gdtimg.com,REJECT
DOMAIN-SUFFIX,ugdtimg.com,REJECT

# Telegram 优化
AND,((PROCESS-NAME,Telegram), (OR,((IP-CIDR,0.0.0.0/8), (IP-CIDR,224.0.0.0/4)))),REJECT
DOMAIN-KEYWORD,buy.itunes.apple.com,Proxy🪁
DOMAIN-SUFFIX,vercel.app,Proxy🪁

# 国内 ASN 直连
IP-ASN,4134,DIRECT,no-resolve
IP-ASN,4837,DIRECT,no-resolve

# 银行 APP 关闭混合网络
DOMAIN-SUFFIX,cmbchina.com,NO-HYBRID

# 下载工具直连 (For MacOS)
PROCESS-NAME,aria2c,DIRECT
PROCESS-NAME,fdm,DIRECT
PROCESS-NAME,Folx,DIRECT
PROCESS-NAME,NetTransport,DIRECT
PROCESS-NAME,Thunder,DIRECT
PROCESS-NAME,Transmission,DIRECT
PROCESS-NAME,uTorrent,DIRECT
PROCESS-NAME,WebTorrent,DIRECT
PROCESS-NAME,WebTorrent Helper,DIRECT

# 远程规则更新通知
AND,((DOMAIN,raw.githubusercontent.com), (DOMAIN-SUFFIX,github.io), (USER-AGENT,Surge/*)),Final,notification-text="♻️External Resources Update",notification-interval=3600
# Blocking UDP Packets by Youtube and ins
AND,((DOMAIN-SUFFIX,googlevideo.com), (DOMAIN-SUFFIX,gvt1.com), (DOMAIN-SUFFIX,cdninstagram.com), (PROTOCOL,UDP)),REJECT

# 隐私保护
DOMAIN,prpr.96110.cn.com,DIRECT
DOMAIN-KEYWORD,96110,REJECT
DOMAIN-SUFFIX,gjfzpt.cn,REJECT

# --- RULE-SET ---
# AdBlock
RULE-SET,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Guard/Advertising.list,AdBlock
# Netflix
RULE-SET,https://blankmagic.github.io/surge/rule/netflix.list,Netflix
# Twitter
RULE-SET,https://blankmagic.github.io/surge/rule/twitter.list,Twitter
# Telegram
RULE-SET,https://blankmagic.github.io/surge/rule/telegram.list,Telegram
# Proxy
RULE-SET,https://blankmagic.github.io/surge/rule/blocked.list,Proxy🪁
# China
RULE-SET,https://blankmagic.github.io/surge/rule/domestic.list,DIRECT
# Apple
DOMAIN,apps.apple.com,Proxy🪁
DOMAIN-SUFFIX,ls.apple.com,DIRECT // Apple Maps
DOMAIN-SUFFIX,store.apple.com,DIRECT // Apple Store Online
RULE-SET,https://blankmagic.github.io/surge/rule/apple.list,Apple

IP-CIDR,0.0.0.0/32,REJECT,no-resolve

# Local Area Network & GeoIP China
# 以下规则将触发本地 DNS 解析
AND,((PROTOCOL,UDP), (DOMAIN-SUFFIX,googlevideo.com)),REJECT-NO-DROP
DOMAIN-SUFFIX,smtp,DIRECT
URL-REGEX,(Subject|HELO|SMTP),DIRECT

# 兜底规则（所有未匹配流量）
FINAL,Final,dns-failed

