# CUSTOM HOST

# ==========================================================
[URL Rewrite]
# 屏蔽统计请求
^https?://.*/(track|analytics|stat)/,REJECT

# google.cn 的请求重定向到 google.com
^https?://(www.)?(g|google)\.cn https://www.google.com 307

# JD Protection
^https?://union\.click\.jd\.com/jda? http://union.click.jd.com/jda?adblock= header
^https?://union\.click\.jd\.com/sem.php? http://union.click.jd.com/sem.php?adblock= header

# AbeamTV Unlock
^https?://api\.abema\.io/v\d/ip/check - reject
# CUSTOM URL

[Header Rewrite]
# 解决github速率限制返回429问题 / Fix GitHub 429 Rate Limit Issue
http-request ^https:\/\/github\.com\/ header-replace Accept-Language en-us
http-request ^https:\/\/(raw|gist)\.githubusercontent\.com\/ header-replace Accept-Language en-us

# ==========================================================
# Wi-Fi专属配置
[SSID Setting]
# 家里Wi-Fi（启用TCP快速打开+禁用代理）
"MyHome-WiFi" = tfo-behaviour=force-enabled,proxy=DIRECT
# 蜂窝网络（禁用UDP）
CELLULAR = udp-enabled=false,proxy=Proxy🪁

# ==========================================================
# 解密 HTTPS 流量，用于重写、抓包调试
[MITM]
# 跳过服务端证书验证
skip-server-cert-verify = true
# MITM over HTTP/2
//MITM over HTTP/2：使用 HTTP/2 协议进行 MITM 解密，可在高并发下优化性能
h2 = true
# 主机名
//Surge 仅会解密这里指定的主机名的请求，ios 系统和某些应用有严格的安全策略，仅信任某些特定的证书，对这些域名启动解密可能导致问题，如 *apple.com, *icloud.com.
#   可使用通配符* 和？
#   可使用前缀-将特定主机名排除
#   默认仅解密发往 443 端口的请求
#   可使用后缀：port 解密特定端口
#   可使用后缀：0解密所有端口
hostname = g.cn, www.g.cn, google.cn, www.google.cn, api.abema.io, union.click.jd.com, -CUSTOMMitM

[Panel]
flushDNS = script-name=flushDNS,update-interval=-1

[Script]
# Flush DNS, show the DNS delay and server.
flushDNS = type=generic,timeout=10,script-path=https://raw.githubusercontent.com/zZPiglet/Task/master/asset/flushDNS.js,argument=icon=wand.and.stars.inverse&color=#3d3d5b
